version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: registry-postgres
    restart: always
    environment:
      POSTGRES_USER: registry_user
      POSTGRES_PASSWORD: registry_pass
      POSTGRES_DB: registry_db
    ports:
      - "5585:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: registry-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
